name: Build Cyberware Mod JAR

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Install Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install PIL
      run: pip install Pillow
    
    - name: Generate Assets
      run: python3 generate_all_assets.py
    
    - name: Make Gradle executable
      run: chmod +x gradlew
    
    - name: Build with Gradle
      run: ./gradlew clean build -x test
    
    - name: Upload JAR
      uses: actions/upload-artifact@v4
      with:
        name: cyberware-jar
        path: build/libs/cyberware-1.0.0.jar
        retention-days: 30
